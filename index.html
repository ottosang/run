<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 러닝 가이드 시스템</title>
    <style>
        /* 기본 설정 및 다크모드 */
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border-color: #333333;
            --dynamic-color: #10B981; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            transition: border-bottom-color 0.3s;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dynamic-color);
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .lang-toggle {
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--dynamic-color);
            color: #000;
            border-color: var(--dynamic-color);
        }

        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 1.2rem;
            background-color: var(--dynamic-color);
            border-radius: 2px;
            transition: background-color 0.3s;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .option-btn {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 20px 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            position: relative;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .course-btn.selected {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--text-main);
            color: var(--text-main);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: var(--level-color);
            margin-bottom: 5px;
            box-shadow: 0 0 10px var(--level-color);
        }

        .level-btn.selected {
            border-color: var(--level-color);
            color: var(--level-color);
            background-color: transparent;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05), 0 0 15px var(--level-color);
        }

        .level-desc {
            font-size: 0.85rem;
            opacity: 0.7;
            color: var(--text-main);
        }

        footer {
            padding: 20px 30px 40px 30px;
            background-color: var(--bg-color);
            text-align: center;
        }

        .start-btn {
            width: 100%;
            max-width: 600px;
            background-color: var(--dynamic-color);
            color: #000;
            border: none;
            padding: 25px;
            border-radius: 16px;
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 25px var(--dynamic-color);
            transition: all 0.3s;
        }

        .start-btn:active {
            filter: brightness(0.8);
        }

        .footer-logo {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 2px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .countdown-text {
            font-size: 2rem;
            color: var(--text-sub);
            margin-bottom: 20px;
        }

        .countdown-number {
            font-size: 12rem;
            font-weight: 900;
            color: var(--dynamic-color);
            line-height: 1;
            text-shadow: 0 0 50px var(--dynamic-color);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .countdown-go {
            font-size: 8rem;
            font-weight: 900;
            color: var(--dynamic-color);
            text-shadow: 0 0 50px var(--dynamic-color);
            display: none;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .title { font-size: 1.2rem; }
            .start-btn { font-size: 1.5rem; padding: 20px; }
            .countdown-number { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title" id="appTitle">SMART RUNNING</div>
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLanguage('ko')" id="btnKo">KOR</button>
            <button class="lang-btn" onclick="setLanguage('en')" id="btnEn">ENG</button>
        </div>
    </header>

    <main>
        <section>
            <div class="section-title" id="courseTitle">코스 선택</div>
            <div class="grid-container" id="courseGrid"></div>
        </section>

        <section>
            <div class="section-title" id="levelTitle">속도 레벨 선택 (LED 색상)</div>
            <div class="grid-container" id="levelGrid"></div>
        </section>
    </main>

    <footer>
        <button class="start-btn" id="startBtn" onclick="startRun()">러닝 시작</button>
        <div class="footer-logo">Powered by iokey.io</div>
    </footer>

    <div class="overlay" id="runOverlay">
        <div class="countdown-text" id="countdownText">잠시 후 출발합니다</div>
        <div class="countdown-number" id="countdownNumber">7</div>
        <div class="countdown-go" id="countdownGo">출발!</div>
    </div>

    <script>
        // 오디오 컨텍스트 초기화 (사운드 발생기)
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 비프음 재생 함수
        function playBeep(frequency, type, duration) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = type; // 'sine', 'square', 'sawtooth', 'triangle'
            oscillator.frequency.value = frequency;

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            // 부드럽게 소리가 꺼지도록 페이드아웃 효과
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        const data = {
            courses: [
                { id: 'c1', ko: '한바퀴 4,000m', en: '1 Lap 4,000m' },
                { id: 'c2', ko: '500m', en: '500m' },
                { id: 'c3', ko: '1,000m', en: '1,000m' },
                { id: 'c4', ko: '2,000m', en: '2,000m' },
                { id: 'c5', ko: '10,000m', en: '10,000m' },
                { id: 'c6', ko: '42,195m', en: '42,195m' }
            ],
            levels: [
                { id: 'l1', ko: '초보', en: 'Beginner', descKo: 'Lv.1', descEn: 'Lv.1', color: '#FFFFFF' }, 
                { id: 'l2', ko: '초급', en: 'Novice', descKo: 'Lv.2', descEn: 'Lv.2', color: '#3B82F6' }, 
                { id: 'l3', ko: '중급', en: 'Intermediate', descKo: 'Lv.3', descEn: 'Lv.3', color: '#06B6D4' }, 
                { id: 'l4', ko: '숙련', en: 'Advanced', descKo: 'Lv.4', descEn: 'Lv.4', color: '#10B981' }, 
                { id: 'l5', ko: '상급', en: 'Expert', descKo: 'Lv.5', descEn: 'Lv.5', color: '#EAB308' }, 
                { id: 'l6', ko: '마스터', en: 'Master', descKo: 'Lv.6', descEn: 'Lv.6', color: '#D946EF' }, 
                { id: 'l7', ko: '프로', en: 'Pro', descKo: 'Lv.7', descEn: 'Lv.7', color: '#EF4444' }  
            ],
            ui: {
                ko: {
                    title: 'SMART RUNNING',
                    courseTitle: '코스 선택',
                    levelTitle: '속도 레벨 선택 (가이드 LED 색상)',
                    startBtn: '러닝 시작',
                    waitText: '잠시 후 출발합니다',
                    goText: '출발!'
                },
                en: {
                    title: 'SMART RUNNING',
                    courseTitle: 'Select Course',
                    levelTitle: 'Select Speed Level (Guide LED Color)',
                    startBtn: 'START RUNNING',
                    waitText: 'Starting soon...',
                    goText: 'GO!'
                }
            }
        };

        let currentLang = 'ko';
        let selectedCourse = 'c1';
        let selectedLevel = 'l4'; 

        function init() {
            renderGrids();
            updateUI();
            updateThemeColor(); 
        }

        function renderGrids() {
            const courseGrid = document.getElementById('courseGrid');
            const levelGrid = document.getElementById('levelGrid');
            
            courseGrid.innerHTML = data.courses.map(course => `
                <div class="option-btn course-btn ${selectedCourse === course.id ? 'selected' : ''}" 
                     onclick="selectCourse('${course.id}')" id="btn_${course.id}">
                    ${course[currentLang]}
                </div>
            `).join('');

            levelGrid.innerHTML = data.levels.map(level => `
                <div class="option-btn level-btn ${selectedLevel === level.id ? 'selected' : ''}" 
                     onclick="selectLevel('${level.id}')" id="btn_${level.id}"
                     style="--level-color: ${level.color};">
                    <div class="color-dot"></div>
                    <span style="font-weight: 700;">${level[currentLang]}</span>
                    <span class="level-desc">${level[currentLang === 'ko' ? 'descKo' : 'descEn']}</span>
                </div>
            `).join('');
        }

        function selectCourse(id) {
            document.getElementById(`btn_${selectedCourse}`).classList.remove('selected');
            selectedCourse = id;
            document.getElementById(`btn_${selectedCourse}`).classList.add('selected');
        }

        function selectLevel(id) {
            document.getElementById(`btn_${selectedLevel}`).classList.remove('selected');
            selectedLevel = id;
            document.getElementById(`btn_${selectedLevel}`).classList.add('selected');
            updateThemeColor(); 
        }

        function updateThemeColor() {
            const levelData = data.levels.find(l => l.id === selectedLevel);
            document.documentElement.style.setProperty('--dynamic-color', levelData.color);
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
            updateUI();
            renderGrids();
        }

        function updateUI() {
            const texts = data.ui[currentLang];
            document.getElementById('appTitle').innerText = texts.title;
            document.getElementById('courseTitle').innerText = texts.courseTitle;
            document.getElementById('levelTitle').innerText = texts.levelTitle;
            document.getElementById('startBtn').innerText = texts.startBtn;
            document.getElementById('countdownText').innerText = texts.waitText;
            document.getElementById('countdownGo').innerText = texts.goText;
        }

        function startRun() {
            // 버튼 클릭 시 오디오 활성화 (브라우저 정책 우회)
            initAudio();

            const overlay = document.getElementById('runOverlay');
            const numberEl = document.getElementById('countdownNumber');
            const textEl = document.getElementById('countdownText');
            const goEl = document.getElementById('countdownGo');
            
            numberEl.style.display = 'block';
            textEl.style.display = 'block';
            goEl.style.display = 'none';
            
            let count = 7;
            numberEl.innerText = count;
            overlay.classList.add('active');

            // 첫 7초 진입 시 첫 비프음 (짧은 소리, 600Hz)
            playBeep(600, 'sine', 0.15);

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    numberEl.innerText = count;
                    // 카운트다운 비프음 재생
                    playBeep(600, 'sine', 0.15);
                } else if (count === 0) {
                    numberEl.style.display = 'none';
                    textEl.style.display = 'none';
                    goEl.style.display = 'block';
                    // 출발(GO) 비프음 재생 (길고 높은 소리, 1000Hz)
                    playBeep(1000, 'sine', 0.6);
                } else {
                    clearInterval(timer);
                    overlay.classList.remove('active');
                    resetToDefault();
                }
            }, 1000);
        }

        function resetToDefault() {
            selectedCourse = 'c1'; 
            selectedLevel = 'l4';  
            setLanguage('ko');
            updateThemeColor();     
        }

        window.onload = init;
    </script>
</body>
</html>
